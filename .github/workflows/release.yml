name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: cargo-budget-report
            name: cargo-budget-report-linux-amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            bin: cargo-budget-report
            name: cargo-budget-report-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: cargo-budget-report
            name: cargo-budget-report-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: cargo-budget-report.exe
            name: cargo-budget-report-windows-amd64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config libudev-dev

      - name: Build
        run: cargo build -p cargo-budget-report --release --target ${{ matrix.target }}

      - name: Rename Artifact
        shell: bash
        run: cp target/${{ matrix.target }}/release/${{ matrix.bin }} ${{ matrix.name }}

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.name }}
